<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Fondo transparente (sin definir para que sea transparente) -->
  
  <!-- Círculo de fondo (opcional, comentado) -->
  <!-- <circle cx="100" cy="100" r="100" fill="#000000"/> -->
  
  <!-- Grupo principal -->
  <g id="toxcity-logo">
    <!-- Skyline - Edificios -->
    <g id="skyline" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Edificio 1 (izquierda) -->
      <rect x="20" y="80" width="12" height="50" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="20" y1="85" x2="32" y2="85" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="20" y1="92" x2="32" y2="92" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="20" y1="99" x2="32" y2="99" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="20" y1="106" x2="32" y2="106" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="20" y1="113" x2="32" y2="113" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="20" y1="120" x2="32" y2="120" stroke="#ffffff" stroke-width="1.5"/>
      
      <!-- Edificio 2 (centro-izquierda) -->
      <rect x="38" y="60" width="14" height="70" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="38" y1="68" x2="52" y2="68" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="38" y1="77" x2="52" y2="77" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="38" y1="86" x2="52" y2="86" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="38" y1="95" x2="52" y2="95" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="38" y1="104" x2="52" y2="104" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="38" y1="113" x2="52" y2="113" stroke="#ffffff" stroke-width="1.5"/>
      
      <!-- Edificio 3 (centro) - Más alto -->
      <rect x="58" y="40" width="16" height="90" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="58" y1="52" x2="74" y2="52" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="58" y1="63" x2="74" y2="63" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="58" y1="74" x2="74" y2="74" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="58" y1="85" x2="74" y2="85" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="58" y1="96" x2="74" y2="96" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="58" y1="107" x2="74" y2="107" stroke="#ffffff" stroke-width="1.5"/>
      
      <!-- Edificio 4 (centro-derecha) -->
      <rect x="80" y="70" width="14" height="60" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="80" y1="80" x2="94" y2="80" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="80" y1="90" x2="94" y2="90" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="80" y1="100" x2="94" y2="100" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="80" y1="110" x2="94" y2="110" stroke="#ffffff" stroke-width="1.5"/>
      
      <!-- Edificio 5 (derecha) -->
      <rect x="100" y="85" width="12" height="45" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="100" y1="95" x2="112" y2="95" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="100" y1="105" x2="112" y2="105" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="100" y1="115" x2="112" y2="115" stroke="#ffffff" stroke-width="1.5"/>
      
      <!-- Edificio 6 (extrema derecha) - Pequeño -->
      <rect x="118" y="95" width="10" height="35" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="118" y1="105" x2="128" y2="105" stroke="#ffffff" stroke-width="1.5"/>
      <line x1="118" y1="115" x2="128" y2="115" stroke="#ffffff" stroke-width="1.5"/>
    </g>
    
    <!-- Línea horizontal base -->
    <line x1="15" y1="130" x2="135" y2="130" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Texto TOXCITY -->
    <text x="75" y="160" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">
      TOXCITY
    </text>
  </g>
  
  <!-- Estilos de animación -->
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      
      #skyline {
        animation: pulse 3s ease-in-out infinite;
      }
    </style>
  </defs>
</svg>
